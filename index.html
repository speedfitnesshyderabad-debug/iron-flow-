<head>

    <title>IronFlow Gym Manager</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --app-height: 100dvh;
        }

        html,
        body {
            height: 100%;
            height: 100dvh;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            height: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .sidebar-item-active {
            background-color: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
        }

        /* Smooth Scrollbars for Desktop */
        @media (min-width: 1024px) {
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: #e2e8f0;
                border-radius: 10px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #cbd5e1;
            }
        }

        /* Prevent text zoom on orientation change */
        html {
            -webkit-text-size-adjust: 100%;
        }

        /* Safe area utilities for Android & iOS */
        .safe-area-top {
            padding-top: env(safe-area-inset-top, 24px);
        }
        .safe-area-top-h {
            height: calc(env(safe-area-inset-top, 24px));
        }
    </style>
    <script type="importmap">

<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <!-- CRITICAL: Capture URL state BEFORE any JS modules run.
         Supabase's createClient() calls history.replaceState() during init
         to clean auth tokens from the URL. We must save them here first. -->
    <script>
        window.__ironflowInitialUrl = {
            search: window.location.search,
            hash: window.location.hash
        };

    </script>

    <script type="module" src="/index.tsx"></script>

</html>
